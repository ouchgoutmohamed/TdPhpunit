name: Run PHPUnit Tests

on:
  push:
    branches:
      - main  
  pull_request:
    branches:
      - main 

jobs:
  phpunit:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3  

      - name: Set up PHP
        uses: shivammathur/setup-php@v2  
        with:
          php-version: '8.2'  
          extensions: mbstring, xml, curl 
          coverage: xdebug  

      - name: Install system dependencies
        run: |
          sudo apt-get install -y libxml2-dev

      - name: Clean vendor folder and lock file
        run: |
          rm -rf vendor/ composer.lock

      - name: Install PHP dependencies via Composer
        run: |
          composer install --prefer-dist --no-interaction --no-scripts

      - name: Check if PHPUnit is installed
        run: |
          if [ ! -f ./vendor/bin/phpunit ]; then
            echo "❌ PHPUnit is missing from vendor/bin/"
            exit 1
          fi

      - name: Run PHPUnit tests
        run: |
          ./vendor/bin/phpunit --configuration phpunit.xml.dist  # Exécute PHPUnit avec ton fichier de configuration
